version: "3.8"

services:

  backend:
    build: ./backend
    container_name: cloudvault-backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    restart: always

  frontend:
    build: ./frontend
    container_name: cloudvault-frontend

    ports:
      - "8080:80"

    depends_on:
      - backend

    restart: always