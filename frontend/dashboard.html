<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | CloudVault AI</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/dashboard.css">

    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar">

        <div class="logo">

            <i class="fa-solid fa-cloud"></i>

            CloudVault AI

        </div>

        <a href="index.html" class="btn">

            Logout

        </a>

    </nav>

    <!-- Dashboard -->

    <section class="dashboard">

        <h1>

            Welcome Back, Naman 👋

        </h1>

        <p>

            Manage all your cloud documents from one place.

        </p>

        <!-- Cards -->

        <div class="dashboard-cards">

            <div class="dashboard-card">

                <i class="fa-solid fa-folder"></i>

                <h2>125</h2>

                <p>Total Files</p>

            </div>

            <div class="dashboard-card">

                <i class="fa-solid fa-cloud"></i>

                <h2>75%</h2>

                <p>Storage Used</p>

            </div>

            <div class="dashboard-card">

                <i class="fa-solid fa-download"></i>

                <h2>89</h2>

                <p>Downloads</p>

            </div>

            <div class="dashboard-card">

                <i class="fa-solid fa-shield-halved"></i>

                <h2>Protected</h2>

                <p>Security</p>

            </div>

        </div>

        <!-- Quick Actions -->

        <div class="quick-actions">

            <h2>Quick Actions</h2>

            <div class="action-buttons">

                <a href="upload.html" class="btn">Upload File</a>

                <a href="files.html" class="btn">My Files</a>

            </div>

        </div>

        <!-- Recent Files -->

        <div class="recent-files">

            <h2>Recent Files</h2>

            <ul>

                <li><i class="fa-solid fa-file-pdf"></i> Resume.pdf</li>

                <li><i class="fa-solid fa-file-word"></i> Project_Report.docx</li>

                <li><i class="fa-solid fa-file-image"></i> Certificate.png</li>

            </ul>

        </div>

    </section>

</body>

</html>
