<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard | CloudVault AI</title>

    <link rel="stylesheet"
          href="css/dashboard.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="sidebar">

    <h2>CloudVault AI</h2>

    <ul>

        <li class="active">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </li>

        <li id="uploadPage">
            <i class="fa-solid fa-upload"></i>
            Upload
        </li>

        <li id="filesPage">
            <i class="fa-solid fa-folder"></i>
            My Files
        </li>

        <li id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </li>

    </ul>

</div>

<div class="main">

    <header>

        <div>

            <h1>

                Welcome,

                <span id="username">

                    User

                </span>

                👋

            </h1>

            <p>

                Manage all your cloud documents securely.

            </p>

        </div>

        <div class="header-right">

            <input
                type="text"
                id="searchInput"
                placeholder="Search files...">

        </div>

    </header>

    <!-- Statistics -->

    <section class="stats">

        <div class="card">

            <i class="fa-solid fa-folder-open"></i>

            <h3>Total Files</h3>

            <h2 id="totalFiles">

                0

            </h2>

        </div>

        <div class="card">

            <i class="fa-solid fa-hard-drive"></i>

            <h3>Storage Used</h3>

            <h2 id="storageUsed">

                0 MB

            </h2>

        </div>

        <div class="card">

            <i class="fa-solid fa-cloud-arrow-up"></i>

            <h3>Uploaded Today</h3>

            <h2 id="todayUploads">

                0

            </h2>

        </div>

        <div class="card">

            <i class="fa-solid fa-user"></i>

            <h3>Account</h3>

            <h2>

                Active

            </h2>

        </div>

    </section>

    <!-- Quick Actions -->

    <section class="actions">

        <button id="uploadBtn">

            <i class="fa-solid fa-upload"></i>

            Upload File

        </button>

        <button id="viewFilesBtn">

            <i class="fa-solid fa-folder-open"></i>

            View Files

        </button>

    </section>

    <!-- Recent Files -->

    <section class="recent-files">

        <div class="section-title">

            <h2>

                Recent Files

            </h2>

        </div>

        <table>

            <thead>

            <tr>

                <th>File Name</th>

                <th>Type</th>

                <th>Size</th>

                <th>Date</th>

                <th>Actions</th>

            </tr>

            </thead>

            <tbody id="recentFiles">

                <!-- Dynamic -->

            </tbody>

        </table>

    </section>

</div>

<script src="js/dashboard.js"></script>

</body>

</html>
