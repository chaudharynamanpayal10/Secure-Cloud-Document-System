<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Files | CloudVault AI</title>

    <link rel="stylesheet"
          href="css/files.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <header>

        <div>

            <h1>

                <i class="fa-solid fa-folder-open"></i>

                My Files

            </h1>

            <p>

                View, Download and Delete your uploaded documents.

            </p>

        </div>

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Search Files...">

        </div>

    </header>

    <!-- Summary Cards -->

    <section class="summary">

        <div class="card">

            <i class="fa-solid fa-folder"></i>

            <h3>Total Files</h3>

            <h2 id="totalFiles">

                0

            </h2>

        </div>

        <div class="card">

            <i class="fa-solid fa-hard-drive"></i>

            <h3>Storage Used</h3>

            <h2 id="storageUsed">

                0 MB

            </h2>

        </div>

    </section>

    <!-- Buttons -->

    <section class="top-buttons">

        <button id="dashboardBtn">

            <i class="fa-solid fa-house"></i>

            Dashboard

        </button>

        <button id="uploadBtn">

            <i class="fa-solid fa-upload"></i>

            Upload File

        </button>

    </section>

    <!-- Files Table -->

    <section class="table-container">

        <table>

            <thead>

                <tr>

                    <th>File Name</th>

                    <th>Type</th>

                    <th>Size</th>

                    <th>Upload Date</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="filesTable">

                <!-- Dynamic Data -->

            </tbody>

        </table>

    </section>

</div>

<script src="js/files.js"></script>

</body>

</html>
