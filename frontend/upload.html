<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Upload Files | CloudVault AI</title>

    <link rel="stylesheet"
          href="css/upload.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="upload-card">

        <h1>

            <i class="fa-solid fa-cloud-arrow-up"></i>

            Upload Document

        </h1>

        <p>

            Securely upload your files to AWS S3 Cloud Storage.

        </p>

        <!-- Drag Area -->

        <div
            class="drop-zone"
            id="dropZone">

            <i class="fa-solid fa-cloud-arrow-up"></i>

            <h2>

                Drag & Drop File Here

            </h2>

            <p>

                or

            </p>

            <label
                for="fileInput"
                class="browse-btn">

                Browse File

            </label>

            <input
                type="file"
                id="fileInput"
                hidden>

        </div>

        <!-- File Preview -->

        <div
            class="file-preview"
            id="filePreview">

            <i class="fa-solid fa-file"></i>

            <h3 id="fileName">

                No File Selected

            </h3>

            <p id="fileSize">

                Size : 0 KB

            </p>

        </div>

        <!-- Progress -->

        <div class="progress-container">

            <div
                class="progress-bar"
                id="progressBar">

            </div>

        </div>

        <p id="progressText">

            0%

        </p>

        <!-- Buttons -->

        <div class="buttons">

            <button
                id="uploadBtn">

                <i class="fa-solid fa-upload"></i>

                Upload File

            </button>

            <button
                id="dashboardBtn">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </button>

        </div>

    </div>

</div>

<script src="js/upload.js"></script>

</body>

</html>
